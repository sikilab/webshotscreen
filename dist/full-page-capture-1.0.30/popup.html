<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页截屏</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="hero">
        <p class="eyebrow">Chrome Extension</p>
        <h1>网页截屏</h1>
        <p class="subtitle">把网页滚动拼接成一张图片，并按分辨率和目标文件大小上限导出。</p>
        <label class="field">
          <span id="lang-label">界面语言</span>
          <select id="language-select" name="language">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
          </select>
        </label>
      </header>

      <section class="page-card">
        <div class="page-meta">
          <span id="label-current-page" class="label">当前页面</span>
          <strong id="page-title">正在读取…</strong>
          <span id="page-size" class="hint">准备获取页面尺寸和总屏数</span>
        </div>
      </section>

      <form id="capture-form">
        <label class="field">
          <span id="label-scroll-target">滚动区域</span>
          <select id="scroll-target" name="scrollTarget">
            <option value="right">右侧滚动区（默认）</option>
            <option value="left">左侧滚动区</option>
            <option value="page">整页 / 主页面</option>
          </select>
        </label>

        <label class="field">
          <span id="label-capture-scope">截图范围</span>
          <select id="capture-scope" name="captureScope">
            <option value="all">全部屏</option>
            <option value="custom">自选屏数</option>
            <option value="line">起止线截图</option>
          </select>
        </label>

        <div id="page-range-field" class="field hidden">
          <span id="label-page-range">屏幕范围</span>
          <div class="inline-group range-group">
            <input id="start-page" name="startPage" type="number" min="1" step="1" placeholder="开始屏">
            <input id="end-page" name="endPage" type="number" min="1" step="1" placeholder="结束屏">
          </div>
          <p id="page-range-hint" class="hint">输入开始屏和结束屏后，将按该范围导出。</p>
        </div>

        <div id="line-range-field" class="field hidden">
          <span id="label-line-range">起止线范围</span>
          <div class="stack-group">
            <button id="pick-line-range-button" class="secondary" type="button">去页面设置起止线并自动截图</button>
            <button id="clear-line-range-button" class="ghost" type="button">清空起止线</button>
          </div>
          <p id="line-range-status" class="hint">还未设置起止线。</p>
          <p id="line-range-tip" class="hint">点击后回到页面，先点开始线，再滚动到结束位置点结束线，可跨多屏；完成后会自动保存图片。</p>
        </div>

        <label class="field">
          <span id="label-export-format">导出格式</span>
          <select id="format" name="format">
            <option value="png">PNG（无损，文件更大）</option>
            <option value="webp">WebP（推荐）</option>
            <option value="jpeg">JPEG（兼容性高）</option>
          </select>
        </label>

        <label class="field">
          <span id="label-resolution">导出分辨率</span>
          <select id="resolution-preset" name="resolutionPreset">
            <option value="1">原始尺寸</option>
            <option value="0.75">75%</option>
            <option value="0.5">50%</option>
            <option value="0.25">25%</option>
            <option value="custom">自定义宽度</option>
          </select>
        </label>

        <label class="field">
          <span id="label-split-threshold">自动分段阈值高度（px）</span>
          <input id="split-height-threshold" name="splitHeightThreshold" type="number" min="2000" step="500" placeholder="18000">
          <p id="split-threshold-tip" class="hint">导出高度超过该值时自动分段导出，优先保持清晰度。</p>
        </label>

        <label class="field hidden" id="custom-width-field">
          <span id="label-custom-width">自定义宽度（像素）</span>
          <input id="custom-width" name="customWidth" type="number" min="320" step="10" placeholder="例如 1440">
        </label>

        <div class="field">
          <span id="label-max-size">目标文件大小上限</span>
          <div class="inline-group">
            <input id="max-size-value" name="maxSizeValue" type="number" min="0" step="0.1" placeholder="留空表示不限">
            <select id="max-size-unit" name="maxSizeUnit">
              <option value="MB">MB</option>
              <option value="KB">KB</option>
            </select>
          </div>
          <p id="max-size-tip" class="hint">设置后会优先压缩质量，必要时自动降低分辨率。</p>
        </div>

        <label class="checkline">
          <input id="hide-fixed" name="hideFixed" type="checkbox" checked>
          <span>截图前临时隐藏 fixed / sticky 悬浮元素</span>
        </label>

        <label class="checkline">
          <input id="save-as" name="saveAs" type="checkbox" checked>
          <span>导出时弹出另存为窗口</span>
        </label>

        <button id="capture-button" class="primary" type="submit">开始整页截图</button>
      </form>

      <section class="status-card">
        <div class="status-head">
          <span id="label-progress" class="label">进度</span>
          <strong id="status-text">等待开始</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="result-text" class="hint">建议截图时保持标签页在前台，不要切换窗口。</p>
      </section>

      <footer id="footer-note" class="footer-note">copyright by sikilab</footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
